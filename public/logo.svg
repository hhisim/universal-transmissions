<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- UT Trinary Symbol — 3 interlocking circles forming a 6-pointed union -->
  <!-- Cyan outer ring -->
  <circle cx="50" cy="28" r="22" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.9"/>
  <!-- Gold outer ring (rotated 60°) -->
  <circle cx="50" cy="28" r="22" stroke="#d4a847" stroke-width="1.5" fill="none" opacity="0.6" 
    transform="rotate(60 50 50)"/>
  <!-- Central unified core -->
  <circle cx="50" cy="50" r="12" stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.8"/>
  <!-- Trinary dots -->
  <circle cx="50" cy="28" r="3" fill="#00e5ff" opacity="0.9"/>
  <circle cx="69" cy="39" r="3" fill="#d4a847" opacity="0.9"/>
  <circle cx="69" cy="61" r="3" fill="#00e5ff" opacity="0.9"/>
  <circle cx="50" cy="72" r="3" fill="#d4a847" opacity="0.9"/>
  <circle cx="31" cy="61" r="3" fill="#00e5ff" opacity="0.9"/>
  <circle cx="31" cy="39" r="3" fill="#d4a847" opacity="0.9"/>
  <!-- Inner geometry -->
  <polygon points="50,38 62,44 62,56 50,62 38,56 38,44" stroke="#00e5ff" stroke-width="0.75" fill="none" opacity="0.4"/>
</svg>
