name: Secret & File Safety Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for sensitive files committed
        run: |
          # Check if .env files were committed (excluding allowed ones)
          ENV_FILES=$(git diff --name-only --diff-filter=ACM ${{ github.event.before }}..${{ github.sha }} | grep -E "^\.env$|\.env\." | grep -v "\.env\.vercel" | grep -v "\.env\.example" || true)
          if [ -n "$ENV_FILES" ]; then
            echo "❌ FAILED: .env files committed to repo:"
            echo "$ENV_FILES"
            exit 1
          fi
          
      - name: Scan for secret patterns in commits
        run: |
          # Use git-secrets or trufflehog if available, otherwise basic grep scan
          echo "Scanning for common secret patterns..."
          BAD_COMMITS=0
          
          # Scan recent commits
          for commit in $(git log --oneline -10 | awk '{print $1}'); do
            CONTENT=$(git show $commit --format=raw 2>/dev/null | grep -v -E "^[+-]" | grep -o -E "sk_live_|whsec_|ghp_|xkeysib-|re_[a-zA-Z0-9]{20,}|[a-zA-Z0-9/+=]{40,}Bearer|vcp_[a-zA-Z0-9]{20,}" | head -5 || true)
            if [ -n "$CONTENT" ]; then
              echo "⚠️  Commit $commit contains potential secrets — review immediately"
              BAD_COMMITS=1
            fi
          done
          
          if [ $BAD_COMMITS -eq 1 ]; then
            echo "❌ Secrets detected in recent commits!"
            exit 1
          fi
          
          echo "✅ No secrets detected in recent commits"
